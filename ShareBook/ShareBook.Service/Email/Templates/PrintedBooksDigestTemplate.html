<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novos livros para você hoje</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #757575;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
        }

        .main-content {
            padding: 27px 18px 32px;
        }

        h2 {
            color: #222;
            font-size: 28px;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .message {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .footer {
            background-color: #333;
            color: white;
            padding: 45px 18px 63px;
            text-align: center;
        }

        .unsubscribe {
            font-size: 12px;
            margin-bottom: 20px;
        }

        .unsubscribe a {
            color: #aaa;
        }

        .divider {
            border-top: 2px solid #505050;
            margin: 18px 0;
        }

        .copyright {
            font-size: 12px;
            font-style: italic;
            color: white;
        }

        .copyright a {
            color: white;
        }

        @media only screen and (max-width: 600px) {
            .main-content {
                padding: 20px 15px 24px;
            }

            h2 {
                font-size: 24px;
            }

            .message {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <h2>Novos livros para você hoje</h2>

            <div class="message">
                Olá, {Name}!<br><br>
                Chegaram {BookCount} livros hoje que eu acho que você vai gostar!
            </div>

            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin: 24px 0;">
                {BookListHtml}
            </table>
        </div>

        <div class="footer">
            <div class="unsubscribe">
                <a href="{UnsubscribeUrl}">Cancelar inscrição</a>
            </div>

            <div class="divider"></div>

            <div class="copyright">
                <a href="{FrontendUrl}">sharebook.com.br</a>
            </div>
        </div>
    </div>
</body>
</html>
